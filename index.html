<!DOCTYPE html>
<html lang="kk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QODEKZ</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Montserrat:wght@300;400;700&display=swap" rel="stylesheet">

<style>
:root{
--neon:#00f2ff;
--bg:#05070a;
}

body{
margin:0;
background:var(--bg);
color:white;
font-family:'Montserrat';
}

/* LOGIN */
.login-btn{
position:fixed;
top:20px;
right:20px;
padding:12px 30px;
border-radius:40px;
border:2px solid var(--neon);
color:var(--neon);
background:transparent;
font-family:'Orbitron';
cursor:pointer;
box-shadow:0 0 10px var(--neon), inset 0 0 10px var(--neon);
}

/* GRID */
.container{padding:40px; max-width:900px; margin:auto;}
.grid{display:grid; grid-template-columns:1fr 1fr; gap:15px;}
@media(max-width:600px){.grid{grid-template-columns:1fr;}}

/* CARDS */
.btn-card{
background:rgba(255,255,255,0.03);
padding:20px;
border-radius:15px;
border:1px solid rgba(255,255,255,0.1);
cursor:pointer;
transition:0.3s;
}
.btn-card:hover{
border-color:var(--neon);
box-shadow:0 0 20px rgba(0,242,255,0.2);
transform:translateY(-5px);
}
.btn-card b{color:var(--neon);}

/* POPUP */
.popup{
position:fixed;
top:-100px;
left:50%;
transform:translateX(-50%);
background:#111;
border:1px solid var(--neon);
padding:15px 30px;
border-radius:10px;
color:var(--neon);
font-family:'Orbitron';
transition:0.5s;
}
.popup.show{top:20px;}

</style>
</head>

<body>

<button class="login-btn" onclick="login()">LOG IN</button>

<div id="popup" class="popup">Тіркелу керек!</div>

<div class="container">

<h2>QODEKZ SYSTEM</h2>

<div class="grid">

<div class="btn-card" onclick="goServices()">
<b>Сайт / Бот / App</b>
</div>

<div class="btn-card" onclick="goInvest()">
<b>Инвестиция</b>
</div>

<div class="btn-card" onclick="goAbout()">
<b>Біз туралы</b>
</div>

<div class="btn-card" onclick="sendMessage()">
<b>Админге жазу</b>
</div>

</div>
</div>

<script>

let isLoggedIn = localStorage.getItem("login") === "true";

function login(){
isLoggedIn = true;
localStorage.setItem("login","true");
alert("Кірдің ✅");
}

function goServices(){
window.location.href="services.html";
}

function goInvest(){
window.location.href="invest.html";
}

function goAbout(){
window.location.href="about.html";
}

function sendMessage(){
if(!isLoggedIn){
showPopup();
return;
}
alert("Хабарлама жіберу функциясын кейін қосамыз");
}

function showPopup(){
const popup = document.getElementById("popup");
popup.classList.add("show");

setTimeout(()=>{
popup.classList.remove("show");
},3000);
}

</script>

</body>
</html>
